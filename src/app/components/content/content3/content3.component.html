<ion-grid class="ion-padding">
  <ion-row>
    @for (filter of filters; track $index) {
    <ion-col
      sizeXs="12"
      sizeSm="12"
      sizeMd="6"
      sizeLg="4"
      sizeXl="3"
      class="ion-align-self-center"
    >
      <app-customized-button
        [buttonType]="'text-only'"
        [buttonData]="{ background: 'pink' }"
        >{{ filter.name }}</app-customized-button
      >
    </ion-col>
    }
  </ion-row>
</ion-grid>
